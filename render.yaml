services:
  - type: web
    name: firasa-api
    env: node
    region: oregon
    plan: free
    autoDeploy: true
    buildCommand: npm install && cd packages/database && npx prisma generate && cd ../.. && npx turbo build --filter=@firasa/api && mkdir -p data
    startCommand: cd packages/database && npx prisma db push --skip-generate && cd ../.. && node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: file:./data/firasa.db
      - key: CORS_ORIGIN
        value: https://firasa-opal.vercel.app
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY_BASE64
        sync: false
      - key: X_API_BEARER_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:support@firasa.app
