# Build Firasa iOS app using GitHub Actions macOS runner
# No Mac needed — this runs on GitHub's cloud macOS machines
#
# Required secrets (set in GitHub repo Settings → Secrets):
#   IOS_CERTIFICATE_P12_BASE64  — Base64-encoded .p12 distribution certificate
#   IOS_CERTIFICATE_PASSWORD     — Password for the .p12 certificate
#   IOS_PROVISIONING_PROFILE_BASE64 — Base64-encoded .mobileprovision file
#   APPLE_TEAM_ID               — Your Apple Developer Team ID
#   APPSTORE_CONNECT_API_KEY_ID — App Store Connect API Key ID (for upload)
#   APPSTORE_CONNECT_ISSUER_ID  — App Store Connect Issuer ID
#   APPSTORE_CONNECT_API_KEY_BASE64 — Base64-encoded .p8 API key file

name: Build iOS App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
    inputs:
      upload_testflight:
        description: 'Upload to TestFlight?'
        type: boolean
        default: false

jobs:
  build-ios:
    runs-on: macos-14  # Apple Silicon runner (M1)
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Add iOS platform
        working-directory: apps/web
        run: npx cap add ios

      - name: Sync Capacitor iOS
        working-directory: apps/web
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: apps/web/ios/App
        run: pod install

      - name: Setup iOS signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile and extract UUID
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      - name: Build iOS archive
        working-directory: apps/web/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Patch the Xcode project to use manual signing with our profile (App target only)
          ruby -e '
            proj = File.read("App.xcodeproj/project.pbxproj")
            proj.gsub!(/CODE_SIGN_STYLE = Automatic;/, "CODE_SIGN_STYLE = Manual;")
            # Set DEVELOPMENT_TEAM for all configs
            proj.gsub!(/DEVELOPMENT_TEAM = .*;/, "DEVELOPMENT_TEAM = \"'"$APPLE_TEAM_ID"'\";")
            # Add provisioning profile and code sign identity where bundle ID is set
            proj.gsub!(/PRODUCT_BUNDLE_IDENTIFIER = app\.firasa\.mobile;/) { |m|
              m + "\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"'"$PROFILE_NAME"'\";\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution\";"
            }
            File.write("App.xcodeproj/project.pbxproj", proj)
          '

          # Debug: verify the changes
          grep -c "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj
          grep "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj | head -3

          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export IPA
        working-directory: apps/web/ios/App
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: firasa-ios-${{ github.sha }}
          path: apps/web/ios/App/build/ipa/*.ipa

      - name: Upload to TestFlight
        if: ${{ inputs.upload_testflight }}
        working-directory: apps/web/ios/App/build/ipa
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode -o $API_KEY_PATH
          xcrun altool --upload-app \
            -f *.ipa \
            -t ios \
            --apiKey "$APPSTORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID" \
            --apiKeyPath "$API_KEY_PATH"

      - name: Cleanup signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12 $RUNNER_TEMP/profile.mobileprovision $RUNNER_TEMP/AuthKey.p8 2>/dev/null || true
