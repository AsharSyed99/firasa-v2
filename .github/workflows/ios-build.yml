name: iOS Build & TestFlight

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - testflight
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/mobile/**'
      - 'packages/**'

concurrency:
  group: ios-build
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  XCODE_VERSION: '15.4'

jobs:
  build-web:
    name: Build Web (Static Export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build web for mobile
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_API_URL: https://api.firasa.app
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: cd apps/web && npx next build

      - name: Upload web export
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: apps/web/out/
          retention-days: 1

  build-ios:
    name: Build iOS App
    needs: build-web
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Download web export
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: apps/web/out/

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        working-directory: apps/mobile
        run: npx cap add ios

      - name: Sync web assets to iOS
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      # --- Simulator build (default) ---
      - name: Build for Simulator
        if: inputs.build_type != 'testflight'
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
          echo "✅ Simulator build succeeded"

      - name: Upload Simulator Build
        if: inputs.build_type != 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: firasa-simulator-${{ github.sha }}
          path: apps/mobile/ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7

      # --- TestFlight build ---
      - name: Install Apple certificate & provisioning profile
        if: inputs.build_type == 'testflight'
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Decode certificate and profile
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive for TestFlight
        if: inputs.build_type == 'testflight'
        working-directory: apps/mobile/ios/App
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Firasa.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            | tail -30
          echo "✅ Archive succeeded"

      - name: Create ExportOptions.plist
        if: inputs.build_type == 'testflight'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.firasa.trading</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        if: inputs.build_type == 'testflight'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Firasa.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            | tail -10
          echo "✅ IPA exported"

      - name: Upload to TestFlight
        if: inputs.build_type == 'testflight'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          # Decode App Store Connect API key
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o $KEY_PATH

          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            2>&1 | tail -5
          echo "✅ Uploaded to TestFlight"

      - name: Upload IPA artifact
        if: inputs.build_type == 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: firasa-ios-${{ github.sha }}
          path: ${{ runner.temp }}/export/App.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: inputs.build_type == 'testflight' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
