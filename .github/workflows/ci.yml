name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: cd apps/api && npx tsc --noEmit
      - run: cd apps/web && npx tsc --noEmit

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./test.db"
      NODE_ENV: test
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY_BASE64: dGVzdC1rZXk=
      X_API_BEARER_TOKEN: test-token
      GROQ_API_KEY: gsk_test
      FINNHUB_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: cd apps/api && npx vitest run --reporter=verbose
        continue-on-error: false

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.firasa.app
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
